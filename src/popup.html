<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #0b1220;
        --panel: #111827;
        --line: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #34d399;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        width: 320px;
        margin: 0;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }
      header .shield { font-size: 18px; }
      header .title { font-weight: 600; font-size: 13px; }
      header .count { margin-left: auto; font-variant-numeric: tabular-nums; }
      header .count b { color: var(--accent); font-size: 16px; }
      .toggles { padding: 10px 14px; display: grid; gap: 10px; }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: space-between;
      }
      .row .label { display: flex; flex-direction: column; }
      .row .label small { color: var(--muted); font-size: 11px; }
      .switch { position: relative; width: 38px; height: 22px; flex: none; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        inset: 0;
        background: var(--line);
        border-radius: 999px;
        transition: 0.15s;
        cursor: pointer;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 16px;
        width: 16px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.15s;
      }
      .switch input:checked + .slider { background: var(--accent); }
      .switch input:checked + .slider::before { transform: translateX(16px); }
      .allow {
        padding: 4px 14px 12px;
        border-top: 1px solid var(--line);
      }
      .allow .head {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 8px 0 6px;
      }
      .allow .add { display: flex; gap: 6px; }
      .allow input[type="text"] {
        flex: 1;
        min-width: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        padding: 5px 8px;
        font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .allow input[type="text"]::placeholder { color: #4b5563; }
      .allow .add button {
        background: var(--accent);
        color: #06281d;
        border: none;
        border-radius: 6px;
        padding: 0 10px;
        font-weight: 600;
        cursor: pointer;
      }
      .allow ul.ids { max-height: none; padding: 8px 0 0; }
      .allow .chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 0;
        border: none;
      }
      .allow .chip .id {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .allow .chip button {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
      }
      .allow .chip button:hover { color: var(--danger); }
      .allow .none { color: #4b5563; font-size: 11px; padding: 4px 0; }
      .log-head {
        display: flex;
        align-items: center;
        padding: 8px 14px 4px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .log-head button {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 11px;
        text-transform: none;
      }
      .log-head button:hover { color: var(--text); }
      ul { list-style: none; margin: 0; padding: 0 0 8px; max-height: 220px; overflow: auto; }
      li {
        padding: 5px 14px;
        border-top: 1px solid #0f1726;
        display: flex;
        gap: 8px;
        align-items: baseline;
      }
      li .tag {
        flex: none;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      li .tag.block { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
      li .tag.fake { background: rgba(52, 211, 153, 0.15); color: #6ee7b7; }
      li .url {
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .empty { padding: 14px; color: var(--muted); text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <span class="shield">🛡</span>
      <span class="title">hide-my-extensions</span>
      <span class="count"><b id="count">0</b> blocked</span>
    </header>

    <div class="toggles">
      <div class="row">
        <span class="label">
          Protection
          <small>Block sites from scanning your extensions</small>
        </span>
        <label class="switch">
          <input type="checkbox" id="enabled" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="row">
        <span class="label">
          Deception mode
          <small>Feed scanners fake "installed" results</small>
        </span>
        <label class="switch">
          <input type="checkbox" id="deception" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="allow">
      <div class="head">Always allow (trusted extension IDs)</div>
      <div class="add">
        <input type="text" id="allow-input" placeholder="extension id (32 letters)" spellcheck="false" />
        <button id="allow-add">Add</button>
      </div>
      <ul class="ids" id="allow-list"></ul>
    </div>

    <div class="log-head">
      This tab
      <button id="clear">clear</button>
    </div>
    <ul id="log"></ul>
    <div class="empty" id="empty">No scans intercepted on this tab yet.</div>

    <script src="popup.js"></script>
  </body>
</html>
